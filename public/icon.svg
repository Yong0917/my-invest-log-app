<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 배경 그라디언트: 딥 네이비 → 인디고 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- 라인 그라디언트: 에메랄드 → 시안 -->
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- 글로우 필터 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- 서브타이틀 장식선 (좌측 상단) -->
  <rect x="88" y="88" width="3" height="48" rx="1.5" fill="#10b981" opacity="0.5"/>

  <!-- F 레터마크 — 굵고 모던한 산세리프 -->
  <!-- 세로 기둥 -->
  <rect x="118" y="152" width="52" height="208" rx="10" fill="white"/>
  <!-- 상단 가로 바 -->
  <rect x="118" y="152" width="160" height="52" rx="10" fill="white"/>
  <!-- 중간 가로 바 -->
  <rect x="118" y="234" width="128" height="44" rx="10" fill="white" opacity="0.85"/>

  <!-- 상승 차트 라인 (우측 하단) -->
  <polyline
    points="236,400 296,330 346,355 416,248"
    stroke="url(#line)"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
  <!-- 끝점 도트 -->
  <circle cx="416" cy="248" r="12" fill="#06b6d4" filter="url(#glow)"/>

  <!-- 우측 하단 장식 점들 -->
  <circle cx="416" cy="410" r="5" fill="#10b981" opacity="0.4"/>
  <circle cx="440" cy="390" r="3.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="432" cy="426" r="2.5" fill="#10b981" opacity="0.25"/>
</svg>
